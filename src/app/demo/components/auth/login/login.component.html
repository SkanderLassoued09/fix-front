<div class="fx-login">
    <div class="fx-login__wrap">
        <!-- Card -->
        <div class="fx-login__card">
            <!-- Logo header -->
            <div class="fx-login__head">
                <img
                    src="assets/layout/images/Fixtronix-logo.png"
                    alt="Fixtronix"
                    class="fx-login__logo"
                />
                <div class="fx-login__tag">Connectez-vous pour continuer</div>
            </div>

            <!-- Body -->
            <div class="fx-login__body">
                <!-- Single-session conflict — shown when the backend returned
                     ACCOUNT_ALREADY_CONNECTED. Dismissable; auto-clears on the
                     next login attempt. -->
                <div *ngIf="alreadyConnected" class="fx-alert" role="alert">
                    <i
                        class="pi pi-exclamation-triangle fx-alert__ico"
                        aria-hidden="true"
                    ></i>
                    <div class="fx-alert__body">
                        <div class="fx-alert__title">Déjà connecté ailleurs</div>
                        <div class="fx-alert__text">
                            Déconnectez
                            <strong *ngIf="blockedUsername"
                                >« {{ blockedUsername }} »</strong
                            ><span *ngIf="!blockedUsername">ce compte</span>
                            de l'autre appareil, ou patientez ~90 s, puis
                            réessayez.
                        </div>
                    </div>
                    <button
                        type="button"
                        class="fx-alert__close"
                        (click)="dismissConflict()"
                        aria-label="Fermer"
                    >
                        <i class="pi pi-times"></i>
                    </button>
                </div>

                <!-- Form -->
                <form
                    [formGroup]="loginForm"
                    class="fx-form"
                    (ngSubmit)="login()"
                >
                    <div class="fx-field">
                        <label for="username" class="fx-label">
                            Nom d'utilisateur
                        </label>
                        <input
                            id="username"
                            formControlName="username"
                            type="text"
                            placeholder="Votre identifiant"
                            autocomplete="username"
                            class="fx-input"
                        />
                    </div>

                    <div class="fx-field">
                        <label for="password" class="fx-label">
                            Mot de passe
                        </label>
                        <div class="fx-pw">
                            <input
                                id="password"
                                formControlName="password"
                                [type]="showPassword ? 'text' : 'password'"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                class="fx-pw__input"
                                [class.fx-pw__input--masked]="!showPassword"
                            />
                            <button
                                type="button"
                                class="fx-pw__toggle"
                                (click)="togglePassword()"
                                [attr.aria-label]="
                                    showPassword
                                        ? 'Masquer le mot de passe'
                                        : 'Afficher le mot de passe'
                                "
                            >
                                <i
                                    class="pi"
                                    [ngClass]="
                                        showPassword ? 'pi-eye' : 'pi-eye-slash'
                                    "
                                ></i>
                            </button>
                        </div>
                    </div>

                    <button
                        type="submit"
                        class="fx-submit"
                        [disabled]="loading"
                        [class.fx-submit--loading]="loading"
                    >
                        <span
                            *ngIf="loading"
                            class="fx-spinner"
                            aria-hidden="true"
                        ></span>
                        <span *ngIf="!loading">Se connecter</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Support -->
        <div class="fx-help">
            Besoin d'aide ?
            <span class="fx-help__link">Contacter le support</span>
        </div>
    </div>
</div>
