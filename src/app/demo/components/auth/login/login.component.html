<div
    class="surface-ground flex align-items-center justify-content-center min-h-screen min-w-screen overflow-hidden"
>
    <div class="flex flex-column align-items-center justify-content-center">
        <img
            src="assets/layout/images/{{
                layoutService.config().colorScheme === 'light'
                    ? 'logo-dark'
                    : 'logo-white'
            }}.svg"
            alt="Sakai logo"
            class="mb-5 w-6rem flex-shrink-0"
        />
        <div
            style="
                border-radius: 56px;
                padding: 0.3rem;
                background: linear-gradient(
                    180deg,
                    var(--primary-color) 10%,
                    rgba(33, 150, 243, 0) 30%
                );
            "
        >
            <div
                class="w-full surface-card py-8 px-5 sm:px-8"
                style="border-radius: 53px"
            >
                <div class="text-center mb-5">
                    <div class="text-900 text-3xl font-medium mb-3">
                        Welcome,to Fixtronix ticketing system
                    </div>
                    <span class="text-600 font-medium"
                        >Sign in to continue</span
                    >
                </div>
                <!-- Single-session block banner — appears when the backend
                     returned ACCOUNT_ALREADY_CONNECTED. Stays in place until
                     the user retries (auto-hides on the next login attempt
                     via component logic), so it's distinct from a toast. -->
                <div
                    *ngIf="alreadyConnected"
                    class="mb-4 p-4 border-round"
                    style="
                        background: #fff7ed;
                        border: 1px solid #fb923c;
                        border-left: 6px solid #ea580c;
                    "
                    role="alert"
                >
                    <div class="flex align-items-start gap-3">
                        <i
                            class="pi pi-exclamation-triangle"
                            style="
                                font-size: 1.6rem;
                                color: #ea580c;
                                margin-top: 0.15rem;
                            "
                        ></i>
                        <div style="color: #7c2d12">
                            <div
                                class="font-bold mb-2"
                                style="font-size: 1.05rem"
                            >
                                Compte déjà connecté sur un autre appareil
                            </div>
                            <div
                                style="line-height: 1.5; font-size: 0.92rem"
                            >
                                Le compte
                                <strong *ngIf="blockedUsername"
                                    >« {{ blockedUsername }} »</strong
                                ><span *ngIf="!blockedUsername"
                                    >que vous essayez d'utiliser</span
                                >
                                est déjà ouvert sur un autre appareil.
                                Déconnectez-vous depuis cet autre appareil,
                                puis réessayez ci-dessous.
                            </div>
                        </div>
                    </div>
                </div>
                <form [formGroup]="loginForm">
                    <div>
                        <label
                            for="username"
                            class="block text-900 text-xl font-medium mb-2"
                            >Nom d'utilisateur</label
                        >
                        <input
                            id="username"
                            formControlName="username"
                            type="text"
                            placeholder="Username"
                            pInputText
                            class="w-full md:w-30rem mb-5"
                            style="padding: 1rem"
                        />

                        <label
                            for="password"
                            class="block text-900 font-medium text-xl mb-2"
                            >Mot de passe</label
                        >
                        <p-password
                            id="password"
                            [(ngModel)]="password"
                            placeholder="Password"
                            [toggleMask]="false"
                            formControlName="password"
                            styleClass="mb-5"
                            [feedback]="false"
                            inputStyleClass="w-full p-3 md:w-30rem"
                        ></p-password>

                        <button
                            pButton
                            pRipple
                            label="Sign In"
                            class="w-full p-3 text-xl"
                            (click)="login()"
                        ></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
